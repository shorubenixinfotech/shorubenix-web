services:
  - type: web
    name: shorubenix-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -k uvicorn.workers.UvicornWorker main:app --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromEnvVar: DATABASE_URL
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000
    rootDir: backend
